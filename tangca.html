<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Tăng Ca</title><link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="toast"></div>
    <div class="container">
        <h1 class="main-title">ĐĂNG KÝ TĂNG CA</h1>
        
        <div class="form-group">
            <label>NGÀY TĂNG CA (*)</label>
            <div class="input-wrapper"><input type="date" id="ngayTC" required></div>
        </div>

        <div class="form-group">
            <label>SỐ THẺ NHÂN VIÊN (*)</label>
            <div class="input-wrapper">
                <input type="number" inputmode="numeric" id="id1" placeholder="Nhập số thẻ của bạn..." required>
                <div class="btn-del" onclick="clearField('id1')">&times;</div>
            </div>
            <div id="msg-id1" class="validation-msg"></div>
        </div>

        <div class="time-group">
            <div class="form-group">
                <label>TỪ GIỜ (*)</label>
                <div class="input-wrapper"><input type="time" id="tuGio" required></div>
            </div>
            <div class="form-group">
                <label>ĐẾN GIỜ (*)</label>
                <div class="input-wrapper"><input type="time" id="denGio" required></div>
            </div>
        </div>
        
        <div id="tongGioText" style="font-size: 14px; color: var(--accent); font-weight: 500; text-align: right; margin-top: -10px; margin-bottom: 16px; display: none;">Tổng cộng: 0 (Giờ)</div>

        <div class="form-group">
            <label>LÝ DO TĂNG CA (*)</label>
            
            <div id="reasonDropdownContainer">
                <select id="lyDo" required onchange="handleReasonChange(this)">
                    <option value="">-- Chọn lý do --</option>
                    <option value="Hàng gấp">Hàng gấp</option>
                    <option value="Sửa máy">Sửa máy</option>
                    <option value="Vệ sinh 5S">Vệ sinh 5S</option>
                    <option value="Khác...">Khác... (Tự nhập)</option>
                </select>
            </div>
            
            <div id="reasonInputContainer" class="input-wrapper" style="display: none;">
                <input type="text" id="lyDoKhac" placeholder="Gõ lý do cụ thể vào đây..." oninput="updateSaveButtonState()">
                <div class="btn-del" onclick="resetReason()">&times;</div>
            </div>
        </div>

        <div id="action-buttons" style="display: flex; gap: 10px; margin-bottom: 24px;">
            <button id="btnSave" class="btn" style="flex: 2; background: var(--success);" onclick="submitData()" disabled>
                <div id="spinner-save" class="spinner"></div><span id="btnSaveText">XÁC NHẬN</span>
            </button>
            <button id="btnCancel" class="btn" style="flex: 1; background: #95a5a6;" onclick="resetForm()" disabled>HỦY</button>
        </div>
        
        <button id="btnViewList" class="btn" onclick="toggleViewList()">XEM DANH SÁCH ĐÃ ĐĂNG KÝ</button>

        <div id="listView" class="monthly-container" style="display: none;">
            <div class="table-responsive">
                <table class="data-table" id="dataTable">
                    <thead><tr><th>NGÀY</th><th>TỪ</th><th>ĐẾN</th><th>GIỜ</th><th>LÝ DO</th><th>TRẠNG THÁI</th></tr></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
    
    <nav class="bottom-nav">
        <button class="nav-btn" onclick="window.location.href='khautrang.html'"><span class="icon">😷</span><span>Khẩu Trang</span></button>
        <button class="nav-btn" onclick="window.location.href='index.html'"><span class="icon">🏠</span><span>Trang Chủ</span></button>
        <button class="nav-btn" onclick="window.location.href='doica.html'"><span class="icon">🔄</span><span>Đổi Ca</span></button>
    </nav>
    
    <script src="core.js"></script><script src="tangca.js"></script>
</body>
</html>
