<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VNPS SUPER APP - TĂNG CA</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="style.css">
    <style>
        /* 1. TIÊU ĐỀ CĂN GIỮA & TĂNG MARGIN */
        .main-title { text-align: center; margin-bottom: 40px !important; font-weight: 700; color: #2c3e50; }

        /* 2. CẤU TRÚC Ô NHẬP SỐ THẺ + HIỂN THỊ TÊN TRONG KHUNG */
        .employee-box {
            display: flex;
            align-items: center;
            border: 1px solid var(--border, #dadce0);
            border-radius: 8px;
            background: var(--input-bg, #f8f9fa);
            height: 46px;
            padding: 0 12px;
            position: relative;
            transition: 0.2s;
        }
        .employee-box:focus-within { border-color: #1a73e8; box-shadow: 0 0 0 2px rgba(26,115,232,0.1); }
        .employee-box .input-icon { color: #5f6368; font-size: 20px; margin-right: 10px; }
        .employee-box input {
            border: none !important;
            background: transparent !important;
            width: 70px; /* Độ rộng vừa đủ cho số thẻ */
            padding: 0 !important;
            font-size: 16px;
            height: 100%;
            outline: none;
        }
        #msg-soThe {
            flex: 1;
            padding-left: 10px;
            border-left: 1px solid #ddd;
            font-size: 13.5px;
            color: #1a73e8;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            height: 100%;
            display: flex;
            align-items: center;
        }

        /* 3. DÒNG THỜI GIAN CHIA 2/3 VÀ 1/3 */
        .time-row-container { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; }
        .time-inputs-group { flex: 2; display: flex; gap: 8px; } /* Chiếm 2/3 */
        .time-inputs-group .input-wrapper { flex: 1; position: relative; }
        .time-inputs-group .input-wrapper input { padding-left: 36px !important; height: 46px; }
        .time-inputs-group .input-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); z-index: 2; color: #5f6368; font-size: 18px; }
        
        #msg-tongCong { 
            flex: 1; /* Chiếm 1/3 */
            background: #e8f0fe;
            height: 46px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-weight: bold;
            color: #1a73e8;
            font-size: 14px;
            border: 1px dashed #1a73e8;
        }

        /* 4. ĐỊNH DẠNG BẢNG DANH SÁCH THÁNG (CỐ ĐỊNH CỘT/HÀNG) */
        .table-scroll-container {
            max-height: 450px;
            overflow: auto; /* Cuộn dọc & ngang */
            border: 1px solid #e5e7eb;
            border-radius: 8px;
        }
        .data-table { border-collapse: separate; border-spacing: 0; width: 100%; min-width: 900px; }
        .data-table thead th { 
            position: sticky; top: 0; z-index: 20; 
            background: #f0f2f5; padding: 12px 8px;
            border-bottom: 2px solid #dee2e6;
        }
        /* Cố định cột NGÀY (Cột 1) và ST (Cột 2) */
        .data-table th:nth-child(1), .data-table td:nth-child(1) { position: sticky; left: 0; z-index: 10; background: white; border-right: 1px solid #eee; }
        .data-table th:nth-child(2), .data-table td:nth-child(2) { position: sticky; left: 85px; z-index: 10; background: white; border-right: 2px solid #dee2e6; }
        .data-table thead th:nth-child(1), .data-table thead th:nth-child(2) { z-index: 25; background: #f0f2f5; }

        /* 5. CỤM NÚT GỬI (2/3) VÀ HỦY (1/3) */
        .action-btns { display: flex; gap: 10px; margin-top: 20px; }
        #btnSubmit { flex: 2; height: 48px; }
        #btnCancel { flex: 1; background: #95a5a6; height: 48px; border-radius: 8px; color: white; border: none; font-weight: bold; cursor: pointer; }

        /* Ô nhập Icon cho các trường khác */
        .input-wrapper.has-icon { position: relative; }
        .input-wrapper.has-icon .input-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #5f6368; font-size: 20px; }
        .input-wrapper.has-icon input, .input-wrapper.has-icon select { padding-left: 40px !important; }
    </style>
</head>
<body>
    <div id="toast"></div>
    <div class="container">
        <h1 class="main-title">NHẬP TĂNG CA</h1>
        
        <form id="tangCaForm">
            <input type="hidden" id="editMaPhieu">

            <div class="form-group">
                <div class="input-wrapper has-icon">
                    <span class="material-symbols-outlined input-icon">calendar_month</span>
                    <input type="date" id="ngayTangCa" required>
                </div>
            </div>

            <div class="form-group">
                <div class="employee-box">
                    <span class="material-symbols-outlined input-icon">badge</span>
                    <input type="number" inputmode="numeric" pattern="[0-9]*" id="soThe" placeholder="ST (*)" required>
                    <div id="msg-soThe">Đang chờ nhập...</div>
                    <div class="btn-del" onclick="clearSoThe()">&times;</div>
                </div>
            </div>

            <input type="hidden" id="idNV">
            <input type="hidden" id="hoTenHidden">
            <input type="hidden" id="boPhanHidden">

            <div class="time-row-container">
                <div class="time-inputs-group">
                    <div class="input-wrapper">
                        <span class="material-symbols-outlined input-icon">login</span>
                        <input type="time" id="tuGio" required title="Từ giờ">
                    </div>
                    <div class="input-wrapper">
                        <span class="material-symbols-outlined input-icon">logout</span>
                        <input type="time" id="denGio" required title="Đến giờ">
                    </div>
                </div>
                <div id="msg-tongCong">TC: 0.00 (h)</div>
            </div>

            <div class="form-group">
                <div class="input-wrapper has-icon">
                    <span class="material-symbols-outlined input-icon">list_alt</span>
                    <select id="lyDoSelect" required>
                        <option value="" disabled selected hidden>Chọn lý do tăng ca (*)...</option>
                        <option value="Sản Xuất">Sản Xuất</option>
                        <option value="Thay Ca">Thay Ca</option>
                        <option value="Sửa Máy">Sửa Máy</option>
                        <option value="Trực nhà máy">Trực nhà máy</option>
                        <option value="Trực bơm SM">Trực bơm SM</option>
                        <option value="Thu hồi SM">Thu hồi SM</option>
                        <option value="Nhập MO">Nhập MO</option>
                        <option value="Đóng Hàng">Đóng Hàng</option>
                        <option value="Xuất Hàng">Xuất Hàng</option>
                        <option value="Kiểm mẫu EPS">Kiểm mẫu EPS</option>
                        <option value="Lên tàu lấy mẫu SM">Lên tàu lấy mẫu SM</option>
                        <option value="OTHER">Lý do khác...</option>
                    </select>
                </div>
                <input type="text" id="lyDoCustom" placeholder="Nhập lý do cụ thể..." style="display: none; margin-top: 8px;">
            </div>

            <div class="form-group">
                <div class="input-wrapper has-icon">
                    <span class="material-symbols-outlined input-icon">category</span>
                    <select id="loaitangca" required>
                        <option value="" disabled selected hidden>Chọn loại tăng ca (*)...</option>
                        <option value="Bình thường平日">Bình thường平日</option>
                        <option value="Chủ nhật假日">Chủ nhật假日</option>
                        <option value="Lễ國定">Lễ國定</option>
                    </select>
                </div>
            </div>

            <div class="action-btns">
                <button type="submit" id="btnSubmit" disabled class="btn-primary">
                    <span id="btnText">GỬI DỮ LIỆU</span>
                    <div id="spinner" class="spinner"></div>
                </button>
                <button type="button" id="btnCancel" onclick="cancelEdit()">HỦY</button>
            </div>
        </form>
        
        <button type="button" id="btnViewList" class="btn-secondary" style="margin-top: 16px;">
            <span id="btnListText">XEM DANH SÁCH THÁNG HIỆN TẠI</span>
            <div id="spinnerList" class="spinner spinner-blue"></div>
        </button>
        
        <div id="dataSection" style="display: none; margin-top: 32px;">
            <div class="table-scroll-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>NGÀY</th>
                            <th>ST</th>
                            <th>HỌ TÊN</th>
                            <th>BỘ PHẬN</th>
                            <th>THỜI GIAN</th>
                            <th>TỔNG</th>
                            <th>TỔNG NĂM</th>
                            <th>LÝ DO TC</th>
                            <th>LOẠI TC</th>
                            <th>SỬA</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
    
    <nav class="bottom-nav">
        <button class="nav-btn" onclick="window.location.href='khautrang.html'"><span class="icon">😷</span><span>Khẩu Trang</span></button>
        <button class="nav-btn" onclick="window.location.href='index.html'"><span class="icon">🏠</span><span>Trang Chủ</span></button>
        <button class="nav-btn" onclick="window.location.href='doica.html'"><span class="icon">🔄</span><span>Đổi Ca</span></button>
    </nav>

    <script src="core.js"></script>
    <script src="tangca.js"></script>
</body>
</html>
