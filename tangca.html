<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Tăng Ca</title><link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="toast"></div>
    <div class="container">
        <h1 class="main-title">NHẬP TĂNG CA</h1>
        
        <div class="form-group">
            <label>Ngày Tăng Ca (*)</label>
            <div class="input-wrapper"><input type="date" id="ngayTC" required></div>
        </div>

        <div class="form-group">
            <label>Số Thẻ (*)</label>
            <div class="input-wrapper">
                <input type="number" inputmode="numeric" id="id1" placeholder="Nhập số thẻ..." required>
                <div class="btn-del" onclick="clearField('id1')">&times;</div>
            </div>
            <div id="msg-id1" class="validation-msg"></div>
        </div>

        <div class="time-group">
            <div class="form-group">
                <label>Từ Giờ (*)</label>
                <div class="input-wrapper"><input type="time" id="tuGio" step="3600" required></div>
            </div>
            <div class="form-group">
                <label>Đến Giờ (*)</label>
                <div class="input-wrapper"><input type="time" id="denGio" step="3600" required></div>
            </div>
        </div>
        
        <div id="tongGioText" style="font-size: 14px; color: var(--accent); font-weight: 500; margin-top: -10px; margin-bottom: 16px; display: none;">Tổng Cộng: 0 (Giờ)</div>

        <div class="form-group">
            <label>Lý Do Tăng Ca (*)</label>
            
            <div class="input-wrapper" id="reasonDropdownContainer">
                <select id="lyDo" required onchange="handleReasonChange(this)">
                    <option value="">Chọn lý do...</option>
                    
                    <option value="Khác... (Tự nhập)">Khác... (Tự nhập)</option>
                </select>
            </div>
            
            <div class="input-wrapper" id="reasonInputContainer" style="display: none;">
                <input type="text" id="lyDoKhac" placeholder="Nhập lý do khác..." oninput="updateSaveButtonState()">
                <div class="btn-del" onclick="resetReason()">&times;</div>
            </div>
        </div>

        <div class="form-group">
            <label>Loại Tăng Ca (*)</label>
            <div class="input-wrapper">
                <select id="loaiTC" required onchange="updateSaveButtonState()">
                    <option value="">Chọn loại ca...</option>

                    </select>
            </div>
        </div>

        <div id="action-buttons" style="display: flex; gap: 10px; margin-bottom: 24px;">
            <button id="btnSave" class="btn" style="flex: 2; background: var(--success);" onclick="submitData()" disabled>
                <div id="spinner-save" class="spinner"></div><span id="btnSaveText">GỬI DỮ LIỆU</span>
            </button>
            <button id="btnCancel" class="btn" style="flex: 1; background: #95a5a6;" onclick="resetForm()" disabled>HỦY</button>
        </div>
        
        <button id="btnViewList" class="btn" style="background: #E8F0FE; color: var(--accent); border: 1px solid var(--accent);" onclick="toggleViewList()">XEM DANH SÁCH THÁNG HIỆN TẠI</button>

        <div id="listView" class="monthly-container" style="display: none;">
            <div class="table-responsive">
                <table class="data-table" id="dataTable">
                    <thead><tr><th>NGÀY</th><th>TỪ</th><th>ĐẾN</th><th>GIỜ</th><th>LÝ DO</th><th>LOẠI</th><th>TRẠNG THÁI</th></tr></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
    
    <nav class="bottom-nav">
        <button class="nav-btn" onclick="window.location.href='khautrang.html'"><span class="icon">😷</span><span>Khẩu Trang</span></button>
        <button class="nav-btn" onclick="window.location.href='index.html'"><span class="icon">🏠</span><span>Trang Chủ</span></button>
        <button class="nav-btn" onclick="window.location.href='doica.html'"><span class="icon">🔄</span><span>Đổi Ca</span></button>
    </nav>
    
    <script src="core.js"></script><script src="tangca.js"></script>
</body>
</html>
