<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VNPS SUPER APP - TĂNG CA V2.3</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="toast"></div>
    <div class="container">
        <h1 class="main-title">NHẬP TĂNG CA</h1>
        
        <form id="tangCaForm">
            <input type="hidden" id="editMaPhieu">

                        <div class="form-group">
                <div class="input-wrapper has-icon">
                    <span class="material-symbols-outlined input-icon">calendar_month</span>
                    <input type="date" id="ngayTangCa" placeholder="NGÀY TĂNG CA" required>
                </div>
                        </div>

          <div id="employeeInputsContainer">
                <div class="form-group employee-row" style="display: flex; gap: 8px;">
                    <div class="employee-box" style="flex: 1;" onclick="this.querySelector('input').focus()">
                        <span class="material-symbols-outlined" style="color: #5f6368; font-size: 22px; margin-right: 8px;">badge</span>
                        <input type="number" inputmode="numeric" pattern="[0-9]*" class="soTheInput" placeholder="SỐ THẺ" required autocomplete="off">
                        <div class="msg-name"></div>
                    </div>
                    <button type="button" id="btnAddEmp" style="width: 48px; background: var(--success); color: white; flex-shrink: 0; padding: 0;">
                        <span class="material-symbols-outlined">add</span>
                    </button>
                </div>
            </div>



            <input type="hidden" id="idNV"><input type="hidden" id="hoTenHidden"><input type="hidden" id="boPhanHidden">

            <div class="time-row-container">
                <div class="time-inputs-group">
                    <div class="input-wrapper has-icon">
                        <span class="material-symbols-outlined input-icon">schedule</span>
                        <input type="time" id="tuGio" placeholder="TỪ GIỜ" required>
                    </div>
                    <div class="input-wrapper has-icon">
                        <span class="material-symbols-outlined input-icon">schedule</span>
                        <input type="time" id="denGio" placeholder="ĐẾN GIỜ" required>
                    </div>
                </div>
                <div id="msg-tongCong">TC: 0.00(h)</div>
            </div>

            <div class="form-group" id="reason-container">
                <div id="reason-select-part" class="input-wrapper has-icon">
                    <span class="material-symbols-outlined input-icon">list_alt</span>
                    <select id="lyDoSelect" required>
                        <option value="" disabled selected hidden>LÝ DO TĂNG CA (*)</option>
                        <option value="Sản Xuất">Sản Xuất</option>
                        <option value="Thay Ca">Thay Ca</option>
                        <option value="Sửa Máy">Sửa Máy</option>
                        <option value="Trực nhà máy">Trực nhà máy</option>
                        <option value="Trực bơm SM">Trực bơm SM</option>
                        <option value="Thu hồi SM">Thu hồi SM</option>
                        <option value="Nhập MO">Nhập MO</option>
                        <option value="Đóng Hàng">Đóng Hàng</option>
                        <option value="Xuất Hàng">Xuất Hàng</option>
                        <option value="Kiểm mẫu EPS">Kiểm mẫu EPS</option>
                        <option value="Lên tàu lấy mẫu SM">Lên tàu lấy mẫu SM</option>
                        <option value="OTHER">Lý do khác...</option>
                    </select>
                </div>
                <div id="reason-custom-part" class="input-wrapper has-icon" style="display: none;">
                    <span class="material-symbols-outlined input-icon">edit_note</span>
                    <input type="text" id="lyDoCustom" placeholder="NHẬP LÝ DO CỤ THỂ...">
                    <div id="btnBackToSelect">&times;</div>
                </div>
            </div>

            <div class="form-group">
                <div class="input-wrapper has-icon">
                    <span class="material-symbols-outlined input-icon">category</span>
                    <select id="loaitangca" required>
                        <option value="" disabled selected hidden>LOẠI TĂNG CA (*)</option>
                        <option value="Bình thường平日">Bình thường</option>
                        <option value="Chủ nhật假日">Chủ nhật</option>
                        <option value="Lễ國定">Lễ</option>
                    </select>
                </div>
            </div>

            <div class="action-btns">
                <button type="submit" id="btnSubmit" disabled>
                    <span id="btnText">GỬI DỮ LIỆU</span>
                    <div id="spinner" class="spinner"></div>
                </button>
                <button type="button" id="btnCancel" onclick="cancelEdit()">HỦY</button>
            </div>
        </form>
        
        <button type="button" id="btnViewList">
            <span id="btnListText">XEM DANH SÁCH THÁNG HIỆN TẠI</span>
            <div id="spinnerList" class="spinner spinner-blue" id="spinnerList"></div>
        </button>
        
        <div id="dataSection" style="display: none; margin-top: 32px;">
            <div class="table-scroll-container">
                <table class="data-table">
                    <thead><tr><th>NGÀY</th><th>ST</th><th>HỌ TÊN</th><th>BP</th><th>THỜI GIAN</th><th>TỔNG</th><th>TỔNG NĂM</th><th>LÝ DO TC</th><th>LOẠI TC</th><th>SỬA</th></tr></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
    
    <nav class="zalo-nav">
    <a href="index.html" class="nav-item">
        <div class="icon-wrapper">
            <img src="icons/home-gray.svg" class="nav-icon icon-normal">
            <img src="icons/home-blue.svg" class="nav-icon icon-active">
        </div>
        <span>Trang chủ</span>
    </a>

    <a href="tangca.html" class="nav-item">
        <div class="icon-wrapper">
            <img src="icons/tangca-gray.svg" class="nav-icon icon-normal">
            <img src="icons/tangca-blue.svg" class="nav-icon icon-active">
        </div>
        <span>Tăng ca</span>
    </a>

    <a href="doica.html" class="nav-item">
        <div class="icon-wrapper">
            <img src="icons/doica-gray.svg" class="nav-icon icon-normal">
            <img src="icons/doica-blue.svg" class="nav-icon icon-active">
        </div>
        <span>Đổi ca</span>
    </a>

    <a href="khautrang.html" class="nav-item">
        <div class="icon-wrapper">
            <img src="icons/mask-gray.svg" class="nav-icon icon-normal">
            <img src="icons/mask-blue.svg" class="nav-icon icon-active">
        </div>
        <span>Khẩu trang</span>
    </a>
</nav>


    <script src="core.js"></script>
    <script src="tangca.js"></script>
</body>
</html>
