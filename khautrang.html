<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cấp Phát Khẩu Trang - VNPS</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>
    <div id="toast"></div>

    <div class="container">
        <h2 style="text-align: center; color: var(--primary); margin-bottom: 20px;">CẤP PHÁT KHẨU TRANG</h2>

        <form id="khauTrangForm">
            <div class="form-group">
                <div class="employee-box" onclick="document.getElementById('soThe').focus()">
                    <span class="material-symbols-outlined">badge</span>
                    <input type="number" id="soThe" placeholder="SỐ THẺ" required autocomplete="off">
                    <div id="msg-soThe" class="msg-name"></div>
                </div>
            </div>

            <div class="form-group">
                <div class="employee-box" onclick="document.getElementById('nhanThay').focus()">
                    <span class="material-symbols-outlined">person_add</span>
                    <input type="text" id="nhanThay" placeholder="NHẬN THAY CHO (NẾU CÓ)" autocomplete="off">
                </div>
            </div>

            <div class="form-group">
                <div style="display: flex; gap: 8px;">
                    <div class="employee-box" style="flex: 1;" onclick="document.getElementById('soLuong').focus()">
                        <span class="material-symbols-outlined">inventory_2</span>
                        <input type="number" id="soLuong" placeholder="SỐ LƯỢNG" required autocomplete="off">
                    </div>
                    <div class="quick-select-wrapper">
                        <button type="button" id="btnQuickSL" style="height: 52px; width: 52px; border-radius: 12px; background: #f0f2f5; border: 1px solid #e5e7eb; color: #5f6368; display: flex; align-items: center; justify-content: center; cursor: pointer;">
                            <span class="material-symbols-outlined">expand_more</span>
                        </button>
                        <div id="quickSLMenu" class="quick-menu">
                            <div onclick="setSL(10)">10</div>
                            <div onclick="setSL(20)">20</div>
                            <div onclick="setSL(30)">30</div>
                            <div onclick="setSL(40)">40</div>
                            <div onclick="setSL(50)">50</div>
                        </div>
                    </div>
                </div>
            </div>

            <div style="display: flex; gap: 12px; margin-top: 25px;">
                <button type="submit" id="btnSubmit" style="flex: 2; height: 50px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; position: relative;">
                    <span id="btnText">XÁC NHẬN</span>
                    <div id="spinner" class="spinner" style="display:none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);"></div>
                </button>
                <button type="button" onclick="resetForm()" style="flex: 1; height: 50px; background: var(--error); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">
                    HỦY
                </button>
            </div>
        </form>

        <div id="dataSection" style="margin-top: 30px;">
            <h3 style="font-size: 14px; color: var(--sub-text); margin-bottom: 10px;">20 LƯỢT NHẬN GẦN NHẤT</h3>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>NGÀY-GIỜ</th>
                            <th>ST</th>
                            <th>HỌ TÊN</th>
                            <th>SL</th>
                            <th>NHẬN THAY</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

   <nav class="zalo-nav">
        <a href="tangca.html" class="nav-item">
            <div class="icon-wrapper">
                <img src="icons/tangca-gray.svg" class="nav-icon icon-normal">
                <img src="icons/tangca-blue.svg" class="nav-icon icon-active">
            </div>
            <span>TĂNG CA</span>
        </a>

        <a href="doica.html" class="nav-item">
            <div class="icon-wrapper">
                <img src="icons/doica-gray.svg" class="nav-icon icon-normal">
                <img src="icons/doica-blue.svg" class="nav-icon icon-active">
            </div>
            <span>ĐỔI CA</span>
        </a>

        <a href="khautrang.html" class="nav-item">
            <div class="icon-wrapper">
                <img src="icons/mask-gray.svg" class="nav-icon icon-normal">
                <img src="icons/mask-blue.svg" class="nav-icon icon-active">
            </div>
            <span>KHẨU TRANG</span>
        </a>
    </nav>

    <script src="core.js"></script>
    <script src="khautrang.js"></script>
</body>
</html>
