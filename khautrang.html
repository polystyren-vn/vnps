<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cấp Phát Khẩu Trang - VNPS</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>
    <div id="toast"></div>

<div class="container">
    <h2 style="text-align: center; color: var(--primary); margin-bottom: 20px;">CẤP PHÁT KHẨU TRANG</h2>

    <form id="khauTrangForm">
        <div id="maskInputsContainer">
            <div class="mask-row">
                <div class="employee-box-compact">
                    <span class="material-symbols-outlined icon-sm">badge</span>
                    <input type="number" inputmode="numeric" class="soTheInput compact" placeholder="ST" required>
                    <div class="divider"></div>
                    <div class="msg-name-compact">Đợi nhập thẻ...</div>
                </div>
                
                <div class="qty-picker-trigger" onclick="openQtyPicker(this)">
                    <span class="current-qty">50</span>
                    <input type="hidden" class="real-qty" value="50">
                </div>

                <button type="button" id="btnAddMaskRow" class="btn-pill-plus">
                    <span class="material-symbols-outlined">add</span>
                </button>
            </div>
        </div>

        <div style="display: flex; gap: 12px; margin-top: 20px;">
            <button type="submit" id="btnSubmit" disabled style="flex: 2; height: 48px; background: var(--primary); border-radius: 12px;">
                <span id="btnText">XÁC NHẬN</span>
                <div id="spinner" class="spinner" style="display:none;"></div>
            </button>
            <button type="button" onclick="window.resetForm()" style="flex: 1; height: 48px; background: var(--error); border-radius: 12px;">HỦY</button>
        </div>
    </form>

    <div id="dataSection" style="margin-top: 25px;">
        <h3 style="font-size: 13px; color: var(--sub-text); margin-bottom: 8px;">NHẬT KÝ 10 LƯỢT GẦN NHẤT</h3>
        <div class="table-sticky-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>NGÀY-GIỜ</th>
                        <th>ST</th>
                        <th style="text-align: left;">HỌ TÊN</th>
                        <th>SL</th>
                        <th>NHẬN THAY</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="qtyPickerModal" class="modal-overlay">
    <div class="modal-content-bottom">
        <div class="modal-header">CHỌN SỐ LƯỢNG</div>
        <div class="qty-grid">
            <div class="qty-item" onclick="selectQty(10)">10</div>
            <div class="qty-item" onclick="selectQty(20)">20</div>
            <div class="qty-item" onclick="selectQty(30)">30</div>
            <div class="qty-item" onclick="selectQty(40)">40</div>
            <div class="qty-item" onclick="selectQty(50)">50</div>
            <div class="qty-item other" onclick="selectQty('OTHER')">Khác</div>
        </div>
        <button type="button" class="btn-close-modal" onclick="closeQtyPicker()">ĐÓNG</button>
    </div>
</div>


   <nav class="zalo-nav">
        <a href="tangca.html" class="nav-item">
            <div class="icon-wrapper">
                <img src="icons/tangca-gray.svg" class="nav-icon icon-normal">
                <img src="icons/tangca-blue.svg" class="nav-icon icon-active">
            </div>
            <span>TĂNG CA</span>
        </a>

        <a href="doica.html" class="nav-item">
            <div class="icon-wrapper">
                <img src="icons/doica-gray.svg" class="nav-icon icon-normal">
                <img src="icons/doica-blue.svg" class="nav-icon icon-active">
            </div>
            <span>ĐỔI CA</span>
        </a>

        <a href="khautrang.html" class="nav-item">
            <div class="icon-wrapper">
                <img src="icons/mask-gray.svg" class="nav-icon icon-normal">
                <img src="icons/mask-blue.svg" class="nav-icon icon-active">
            </div>
            <span>KHẨU TRANG</span>
        </a>
    </nav>

    <script src="core.js"></script>
    <script src="khautrang.js"></script>
</body>
</html>
