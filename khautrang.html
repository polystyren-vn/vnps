<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cấp Phát Khẩu Trang - VNPS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>
    <div id="toast"></div>
    <div class="container">
        <h2 class="main-title">CẤP PHÁT KHẨU TRANG</h2>
        <form id="khauTrangForm">
            <div id="maskInputsContainer">
                <div class="mask-row">
                    <div class="employee-box" style="flex: 1;" onclick="this.querySelector('input').focus()">
                        <span class="material-symbols-outlined">badge</span>
                        <input type="number" inputmode="numeric" class="soTheInput" placeholder="SỐ THẺ" required autocomplete="off">
                        <div class="msg-name"></div>
                    </div>
                    <div class="qty-picker-trigger" onclick="toggleQtyPicker(event, this)">
                        <span class="current-qty">SL</span>
                        <span class="material-symbols-outlined dropdown-icon" style="font-size:18px;">arrow_drop_down</span>
                        <input type="number" inputmode="numeric" class="inline-qty-input" style="display:none;" placeholder="...">
                        <input type="hidden" class="real-qty" value="">
                    </div>
                    <button type="button" id="btnAddMaskRow" class="btn-pill-plus"><span class="material-symbols-outlined">add</span></button>
                </div>
            </div>
        </form>
           <div id="dataSection" style="margin-top: 30px;">
            <div id="tableLoading" style="text-align: center; color: #5F6368; font-size: 13px; font-style: italic; padding: 20px 0;">
                Đang tải danh sách...
            </div>
            
            <div class="table-scroll-container" id="tableContainer" style="display: none;">
                <table id="ktTable" class="data-table">
                    <thead>
                        <tr>
                            <th>NGÀY-GIỜ</th>
                            <th>ST</th>
                            <th>HỌ TÊN</th>
                            <th>SL</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div> <div id="ktDropdown" class="smart-dropdown-menu">
        <div class="smart-dropdown-item" onclick="selectQty(10)">10</div>
        <div class="smart-dropdown-item" onclick="selectQty(20)">20</div>
        <div class="smart-dropdown-item" onclick="selectQty(30)">30</div>
        <div class="smart-dropdown-item" onclick="selectQty(40)">40</div>
        <div class="smart-dropdown-item" onclick="selectQty(50)">50</div>
        <div class="smart-dropdown-item" onclick="selectQty('OTHER')" style="color:var(--accent)">Khác</div>
    </div>

    <div id="bsBackdrop" class="bs-backdrop"></div>
    <div id="smartBottomSheet" class="smart-bottom-sheet">
        <div class="smart-bs-content">
            <div id="smartBSMsg" class="smart-bs-text"></div>
            <div class="smart-bs-btns">
                <button type="button" id="smartBtnCancel">HỦY</button>
                <button type="button" id="smartBtnSubmit" disabled>
                    <span id="bsBtnText">XÁC NHẬN</span>
                    <div class="spinner" id="bsSpinner" style="display:none; width: 20px; height: 20px; border: 3px solid #fff; border-top: 3px solid transparent; border-radius: 50%; animation: spin 1s linear infinite;"></div>
                </button>
            </div>
        </div>
    </div>


    <nav class="zalo-nav">
        <a href="tangca.html" class="nav-item">
            <div class="icon-wrapper"><img src="icons/tangca-gray.svg" class="nav-icon icon-normal"><img src="icons/tangca-blue.svg" class="nav-icon icon-active"></div>
            <span>TĂNG CA</span>
        </a>
        <a href="doica.html" class="nav-item">
            <div class="icon-wrapper"><img src="icons/doica-gray.svg" class="nav-icon icon-normal"><img src="icons/doica-blue.svg" class="nav-icon icon-active"></div>
            <span>ĐỔI CA</span>
        </a>
        <a href="khautrang.html" class="nav-item active">
            <div class="icon-wrapper"><img src="icons/mask-gray.svg" class="nav-icon icon-normal"><img src="icons/mask-blue.svg" class="nav-icon icon-active"></div>
            <span>KHẨU TRANG</span>
        </a>
    </nav>
    <script src="core.js"></script>
    <script src="khautrang.js"></script>
</body>
</html>
