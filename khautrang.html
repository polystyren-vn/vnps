<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cấp Phát Khẩu Trang - VNPS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>
    <div id="toast"></div>

    <div class="container">
        <h2 class="main-title">CẤP PHÁT KHẨU TRANG</h2>

        <form id="khauTrangForm">
            <div id="maskInputsContainer">
                <div class="mask-row">
                    <div class="employee-box" style="flex: 1;" onclick="this.querySelector('input').focus()">
                        <span class="material-symbols-outlined">badge</span>
                        <input type="number" inputmode="numeric" class="soTheInput" placeholder="ST" required autocomplete="off">
                        <div class="msg-name"></div>
                    </div>
                    
                    <div class="qty-picker-trigger" onclick="openQtyPicker(this)">
                        <span class="current-qty">50</span>
                        <span class="material-symbols-outlined" style="font-size: 18px; margin-left: 2px;">arrow_drop_down</span>
                        <input type="hidden" class="real-qty" value="50">
                    </div>

                    <button type="button" id="btnAddMaskRow" class="btn-pill-plus">
                        <span class="material-symbols-outlined">add</span>
                    </button>
                </div>
            </div>

            <div class="action-btns" style="margin-top: 25px;">
                <button type="submit" id="btnSubmit" disabled>
                    <span id="btnText">XÁC NHẬN</span>
                    <div id="spinner" class="spinner"></div>
                </button>
                <button type="button" id="btnCancel" onclick="window.resetForm()">HỦY</button>
            </div>
        </form>

        <div id="dataSection">
            <h3 style="font-size: 13px; color: var(--sub-text); margin-bottom: 8px; font-weight: 600; text-align: center;">DANH SÁCH NHẬN GẦN NHẤT</h3>
            <div class="table-scroll-container">
                <table id="ktTable" class="data-table">
                    <thead>
                        <tr>
                            <th>NGÀY-GIỜ</th>
                            <th>ST</th>
                            <th style="text-align: left;">HỌ TÊN</th>
                            <th>SL</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="ktDropdown" class="smart-dropdown-menu">
        <div class="smart-dropdown-item" onclick="selectQty(10)">10</div>
        <div class="smart-dropdown-item" onclick="selectQty(20)">20</div>
        <div class="smart-dropdown-item" onclick="selectQty(30)">30</div>
        <div class="smart-dropdown-item" onclick="selectQty(40)">40</div>
        <div class="smart-dropdown-item" onclick="selectQty(50)">50</div>
        <div class="smart-dropdown-item" onclick="selectQty('OTHER')" style="color: var(--accent);">Khác</div>
    </div>

    <nav class="zalo-nav">
        <a href="tangca.html" class="nav-item">
            <div class="icon-wrapper">
                <img src="icons/tangca-gray.svg" class="nav-icon icon-normal">
                <img src="icons/tangca-blue.svg" class="nav-icon icon-active">
            </div>
            <span>TĂNG CA</span>
        </a>
        <a href="doica.html" class="nav-item">
            <div class="icon-wrapper">
                <img src="icons/doica-gray.svg" class="nav-icon icon-normal">
                <img src="icons/doica-blue.svg" class="nav-icon icon-active">
            </div>
            <span>ĐỔI CA</span>
        </a>
        <a href="khautrang.html" class="nav-item">
            <div class="icon-wrapper">
                <img src="icons/mask-gray.svg" class="nav-icon icon-normal">
                <img src="icons/mask-blue.svg" class="nav-icon icon-active">
            </div>
            <span>KHẨU TRANG</span>
        </a>
    </nav>

    <script src="core.js"></script>
    <script src="khautrang.js"></script>
</body>
</html>
