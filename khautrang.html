<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cấp Phát Khẩu Trang - VNPS</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>
    <div id="toast"></div>

<div class="container">
    <h2 style="text-align: center; color: var(--primary); margin-bottom: 20px;">CẤP PHÁT KHẨU TRANG</h2>

    <form id="khauTrangForm">
        <div id="maskInputsContainer">
            <div class="form-group mask-row" style="display: flex; gap: 8px; align-items: flex-start; margin-bottom: 12px;">
                <div class="employee-box" style="flex: 2;" onclick="this.querySelector('input').focus()">
                    <span class="material-symbols-outlined">badge</span>
                    <input type="number" inputmode="numeric" class="soTheInput" placeholder="SỐ THẺ" required autocomplete="off">
                    <div class="msg-name"></div>
                </div>
                
                <div class="quantity-box" style="flex: 1;">
                    <select class="slSelect" style="width: 100%; height: 50px; border-radius: 8px; border: 1px solid #ccc; outline: none; padding: 0 10px; font-weight: bold; color: var(--primary); font-size: 16px;">
                        <option value="50" selected>50</option>
                        <option value="40">40</option>
                        <option value="30">30</option>
                        <option value="20">20</option>
                        <option value="10">10</option>
                        <option value="OTHER">Khác</option>
                    </select>
                    <input type="number" class="slCustom" placeholder="SL..." style="display: none; width: 100%; height: 50px; border-radius: 8px; border: 1px solid var(--accent); outline: none; padding: 0 10px; font-weight: bold; text-align: center; font-size: 16px;">
                </div>

                <button type="button" id="btnAddMaskRow" style="width: 50px; height: 50px; flex-shrink: 0; border-radius: 8px; background: var(--success); color: white; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;">
                    <span class="material-symbols-outlined">add</span>
                </button>
            </div>
        </div>

        <div style="display: flex; gap: 12px; margin-top: 25px;">
            <button type="submit" id="btnSubmit" disabled style="flex: 2; height: 50px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; position: relative;">
                <span id="btnText">XÁC NHẬN</span>
                <div id="spinner" class="spinner" style="display:none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);"></div>
            </button>
            <button type="button" onclick="window.resetForm()" style="flex: 1; height: 50px; background: var(--error); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">
                HỦY
            </button>
        </div>
    </form>

    <div id="dataSection" style="margin-top: 30px;">
        <h3 style="font-size: 14px; color: var(--sub-text); margin-bottom: 10px;">NHẬT KÝ CẤP PHÁT GẦN NHẤT</h3>
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>NGÀY-GIỜ</th>
                        <th>ST</th>
                        <th style="text-align: left;">HỌ TÊN</th>
                        <th>SL</th>
                        <th>NHẬN THAY</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

   <nav class="zalo-nav">
        <a href="tangca.html" class="nav-item">
            <div class="icon-wrapper">
                <img src="icons/tangca-gray.svg" class="nav-icon icon-normal">
                <img src="icons/tangca-blue.svg" class="nav-icon icon-active">
            </div>
            <span>TĂNG CA</span>
        </a>

        <a href="doica.html" class="nav-item">
            <div class="icon-wrapper">
                <img src="icons/doica-gray.svg" class="nav-icon icon-normal">
                <img src="icons/doica-blue.svg" class="nav-icon icon-active">
            </div>
            <span>ĐỔI CA</span>
        </a>

        <a href="khautrang.html" class="nav-item">
            <div class="icon-wrapper">
                <img src="icons/mask-gray.svg" class="nav-icon icon-normal">
                <img src="icons/mask-blue.svg" class="nav-icon icon-active">
            </div>
            <span>KHẨU TRANG</span>
        </a>
    </nav>

    <script src="core.js"></script>
    <script src="khautrang.js"></script>
</body>
</html>
