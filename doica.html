<div id="toast"></div>
<div class="container">
    <h1 class="main-title">ĐỔI CA & CẬP NHẬT CA</h1>
    
    <form id="doiCaForm">
        <div class="form-group">
            <div class="employee-box" onclick="document.getElementById('id1').focus()">
                <span class="material-symbols-outlined input-icon">person</span>
                <input type="number" inputmode="numeric" pattern="[0-9]*" id="id1" placeholder="Số thẻ NV1">
                <div id="msg-id1" class="msg-name"></div>
            </div>
        </div>

        <div class="form-group">
            <div class="employee-box" onclick="document.getElementById('id2').focus()">
                <span class="material-symbols-outlined input-icon">swap_horiz</span>
                <input type="number" inputmode="numeric" pattern="[0-9]*" id="id2" placeholder="Số thẻ NV2 (Nếu đổi ca)">
                <div id="msg-id2" class="msg-name"></div>
            </div>
        </div>

        <div id="smartMatrixContainer" class="smart-matrix-box" style="display: none;">
            <table id="smartTable"></table>
        </div>
    </form>

    <div id="smartPickerOverlay" class="smart-overlay" style="display: none;">
        <div class="smart-picker-card">
            <h3>Chọn ca mới</h3>
            <p id="smartPickerDate">Ngày: --/--</p>
            <div id="smartShiftOptions" class="smart-grid-options"></div>
            <button type="button" class="smart-btn-close" onclick="closeSmartPicker()">HỦY</button>
        </div>
    </div>

    <div id="smartBottomSheet" class="smart-bottom-sheet">
        <div class="smart-bs-content">
            <div id="smartBSMsg" class="smart-bs-text">Xác nhận thao tác...</div>
            <div class="smart-bs-btns">
                <button type="button" id="smartBtnCancel">HỦY</button>
                <button type="button" id="smartBtnSubmit">
                    <span id="smartBtnText">XÁC NHẬN</span>
                </button>
            </div>
        </div>
    </div>
</div>
