<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VNPS SUPER APP - ĐỔI CA</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="toast"></div>
    <div class="container">
        <h1 class="main-title">ĐỔI CA & CẬP NHẬT CA</h1>
        
        <form id="doiCaForm">
            
            <div class="form-group">
                <div class="employee-box" onclick="document.getElementById('id1').focus()">
                    <span class="material-symbols-outlined input-icon">person</span>
                    <input type="number" inputmode="numeric" pattern="[0-9]*" id="id1" placeholder="NV1" style="width: 120px;" required>
                    <div id="msg-id1" class="msg-name"></div>
                </div>
            </div>

            <div class="form-group">
                <div class="employee-box" onclick="document.getElementById('id2').focus()">
                    <span class="material-symbols-outlined input-icon">person</span>
                    <input type="number" inputmode="numeric" pattern="[0-9]*" id="id2" placeholder="NV2" style="width: 120px;">
                    <div id="msg-id2" class="msg-name"></div>
                </div>
            </div>

            <div class="form-group">
                <div class="input-wrapper has-icon">
                    <span class="material-symbols-outlined input-icon">calendar_month</span>
                    <input type="date" id="startDate" placeholder="CHỌN NGÀY BẮT ĐẦU (*)" required>
                </div>
            </div>

            <div id="grid7" class="grid-7">
                <div class="grid-header">
                    <div>THỨ-NGÀY</div>
                    <div id="gh-nv1">NV1</div>
                    <div id="gh-nv2">NV2</div>
                </div>
                <div id="grid-body"></div>
            </div>
            
             <div class="action-btns">
                <button type="button" id="btnSubmit" onclick="submitData()" disabled>
                    <span id="btnText">XÁC NHẬN CẬP NHẬT</span>
                </button>
                <button type="button" id="btnCancel" onclick="resetForm()">HỦY</button>
             </div>
        </form>

       <button type="button" id="btnViewList" onclick="toggleMonthly()">
                <span id="btnListText">XEM LỊCH THÁNG HIỆN TẠI</span>
       </button>

        <div id="monthlyView" class="monthly-container" style="display: none;">
            <div class="table-responsive"><table id="monthlyTable"></table></div>
        </div>
    </div>
    
    <nav class="bottom-nav">
        <button class="nav-btn" onclick="window.location.href='khautrang.html'"><span class="icon">😷</span><span>Khẩu Trang</span></button>
        <button class="nav-btn" onclick="window.location.href='index.html'"><span class="icon">🏠</span><span>Trang Chủ</span></button>
        <button class="nav-btn" onclick="window.location.href='tangca.html'"><span class="icon">⏳</span><span>Tăng Ca</span></button>
    </nav>
    
    <script src="core.js"></script>
    <script src="doica.js"></script>
</body>
</html>
