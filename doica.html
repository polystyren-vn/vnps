<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đổi Ca PS</title><link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="toast"></div>
    <div class="container">
        <h1 class="main-title">ĐỔI CA & CẬP NHẬT CA</h1>
        
        <div class="form-group">
            <label>CHỌN NGÀY BẮT ĐẦU ĐỔI CA</label>
            <div class="input-wrapper">
                <input type="date" id="startDate" required>
            </div>
        </div>

        <div class="form-group">
            <label>SỐ THẺ NV1 (*)</label>
            <div class="input-wrapper">
                <input type="number" inputmode="numeric" id="id1" placeholder="Nhập số thẻ của bạn..." required>
                <div class="btn-del" onclick="clearField('id1')">&times;</div>
            </div>
            <div id="msg-id1" class="validation-msg"></div>
        </div>

        <div class="form-group">
            <label>SỐ THẺ NV2</label>
            <div class="input-wrapper">
                <input type="number" inputmode="numeric" id="id2" placeholder="Để trống nếu tự cập nhật ca...">
                <div class="btn-del" onclick="clearField('id2')">&times;</div>
            </div>
            <div id="msg-id2" class="validation-msg"></div>
        </div>

        <div id="grid7" class="grid-7">
            <div class="grid-header">
                <div>NGÀY</div>
                <div id="gh-nv1">NV1</div>
                <div id="gh-nv2">NV2</div>
            </div>
            <div id="grid-body">
                </div>
        </div>
        
        <button id="btnSave" class="btn btn-blue" style="display:none; background: var(--success); margin-bottom: 32px;" onclick="submitData()">
            <div id="spinner-save" class="spinner"></div> 
            <span id="btnSaveText">XÁC NHẬN</span>
        </button>

        <div id="monthlyView" class="monthly-container">
            <h2 class="main-title" id="monthlyTitle" style="font-size: 0.9rem;">ĐANG TẢI LỊCH THÁNG...</h2>
            <div class="table-responsive">
                <table id="monthlyTable"></table>
            </div>
        </div>
    </div>
    
    <nav class="bottom-nav">
        <button class="nav-btn" onclick="window.location.href='khautrang.html'"><span class="icon">😷</span><span>Khẩu Trang</span></button>
        <button class="nav-btn" onclick="window.location.href='index.html'"><span class="icon">🏠</span><span>Trang Chủ</span></button>
        <button class="nav-btn active"><span class="icon">🔄</span><span>Đổi Ca</span></button>
    </nav>
    <script src="core.js"></script><script src="doica.js?v=3.0"></script>
</body>
</html>
