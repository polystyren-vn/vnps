<div class="container">
    <h1 class="main-title">ĐỔI CA & CẬP NHẬT CA</h1>
    
    <form id="doiCaForm">
        <div class="input-group">
            <div class="employee-box" onclick="document.getElementById('id1').focus()">
                <span class="material-symbols-outlined input-icon">person</span>
                <input type="number" inputmode="numeric" pattern="[0-9]*" id="id1" placeholder="Số thẻ NV1">
                <div id="msg-id1" class="msg-name"></div>
            </div>
        </div>

        <div class="input-group">
            <div class="employee-box" onclick="document.getElementById('id2').focus()">
                <span class="material-symbols-outlined input-icon">swap_horiz</span>
                <input type="number" inputmode="numeric" pattern="[0-9]*" id="id2" placeholder="Số thẻ NV2 (Nếu đổi ca)">
                <div id="msg-id2" class="msg-name"></div>
            </div>
        </div>
    </form>

    <div id="smartTableContainer" style="display: none;">
        <div class="table-responsive">
            <table id="monthlyTable">
                </table>
        </div>
    </div>

    <div id="shiftPickerOverlay" class="picker-overlay" style="display: none;">
        <div class="shift-picker-box">
            <h3>Chọn ca mới</h3>
            <p id="pickerDateLabel" style="color: #5F6368; font-size: 14px; margin-bottom: 16px;">Ngày: --/--</p>
            <div id="shiftOptions" class="shift-options">
                </div>
            <button type="button" class="btn-cancel-picker" onclick="closeShiftPicker()">HỦY CHỌN</button>
        </div>
    </div>

    <div id="bottomSheet" class="bottom-sheet">
        <div class="bs-content">
            <div id="bsMessage" class="bs-message">Xác nhận thao tác...</div>
            <div class="bs-actions">
                <button type="button" id="btnCancelSheet">HỦY</button>
                <button type="button" id="btnSubmitSheet">
                    <span id="btnTextSheet">XÁC NHẬN</span>
                </button>
            </div>
        </div>
    </div>
</div>
